<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Who Ordered This?!</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="titleScreen">

<h1>Who Ordered This?!</h1>

<button id="startBtn">Start Game</button>

</div>

<div id="instructionScreen">

<h2>How To Play</h2>

<div class="instructionBox">

<p>Serve real customers.</p>
<p>Reject imposters.</p>
<p>If they order something not on the menu, reject them.</p>
<p>You only get <b>3 mistakes</b>.</p>

</div>

<button id="instructionBtn">Continue</button>

</div>

<div id="gameScreen">

<div id="gameArea">
<img id="customerImage">
</div>

<div id="characterName">Customer</div>

<div id="orderBubble">Order</div>

<div id="gameButtons">
<button id="serveBtn">Serve</button>
<button id="rejectBtn">Reject</button>
</div>

<div id="streak">Score: 0 | Streak: 0 | Mistakes: 0/3</div>

</div>

<script src="script.js"></script>

</body>
</html>
